<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0871b3" />
    <title>Offline — Patela Farm</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      main {
        max-width: 28rem;
        width: 100%;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 1.5rem;
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.06);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 1.25rem;
        font-size: 0.875rem;
        line-height: 1.5;
        color: #475569;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      a {
        display: inline-flex;
        align-items: center;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
      }
      .primary {
        background: #0871b3;
        color: #fff;
      }
      .secondary {
        border: 1px solid #e2e8f0;
        color: #334155;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>
        The app couldn’t reach the network. Some features may still work if they were cached before.
      </p>
      <div class="actions">
        <a class="primary" href="/">Go to dashboard</a>
        <a class="secondary" href="/inventory">Open Inventory</a>
      </div>
    </main>
  </body>
</html>
